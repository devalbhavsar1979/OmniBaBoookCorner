<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1E4D8C" />
    <meta name="description" content="Ba Book Corner - Ba Foundation Library Management System" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />

    <!-- PWA Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Ba Book Corner" />

    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ba Book Corner" />

    <title>Ba Book Corner</title>
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Service Worker registration for PWA install prompt -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js')
            .then(function (reg) {
              console.log('SW registered:', reg.scope);
            })
            .catch(function (err) {
              console.log('SW registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
